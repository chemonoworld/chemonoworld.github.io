<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DKG degree t polynomial shares example</title>
  <desc id="desc">A degree t polynomial with the y-intercept labeled secret key and share points at x equals 1, 2, and 3.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243447"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="600" fill="#f8fafc"/>

  <g transform="translate(96 70)">
    <rect x="0" y="0" width="768" height="440" rx="8" fill="#ffffff" stroke="#d8e0ea" filter="url(#soft-shadow)"/>

    <!-- Plot grid -->
    <g stroke="#e7edf5" stroke-width="1">
      <path d="M 80 52 V 380"/>
      <path d="M 220 52 V 380"/>
      <path d="M 360 52 V 380"/>
      <path d="M 500 52 V 380"/>
      <path d="M 640 52 V 380"/>
      <path d="M 72 320 H 700"/>
      <path d="M 72 250 H 700"/>
      <path d="M 72 180 H 700"/>
      <path d="M 72 110 H 700"/>
    </g>

    <!-- Axes -->
    <g stroke="#243447" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
      <path d="M 80 350 H 704"/>
      <path d="M 80 350 V 54"/>
    </g>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#3f4e60">
      <text x="708" y="357" font-size="17">x</text>
      <text x="68" y="46" font-size="17">y</text>
      <text x="209" y="378" font-size="15">x<tspan baseline-shift="sub" font-size="11">1</tspan></text>
      <text x="349" y="378" font-size="15">x<tspan baseline-shift="sub" font-size="11">2</tspan></text>
      <text x="489" y="378" font-size="15">x<tspan baseline-shift="sub" font-size="11">3</tspan></text>
    </g>

    <!-- Polynomial curve: f(x) = a0 + a1*x + ... + a_t*x^t -->
    <path d="M 80 260 C 165 224, 230 204, 290 195 C 372 183, 438 198, 500 220 C 574 246, 626 272, 684 284"
          fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>

    <!-- Secret key at y-intercept -->
    <g>
      <path d="M 80 260 L 112 168" stroke="#ef4444" stroke-width="2.4" stroke-dasharray="6 6" fill="none"/>
      <circle cx="80" cy="260" r="7.5" fill="#ef4444" stroke="#ffffff" stroke-width="3"/>
      <rect x="94" y="112" width="146" height="56" rx="8" fill="#fff5f5" stroke="#fecaca"/>
      <text x="110" y="135" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#b91c1c">secret key</text>
      <text x="110" y="155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#7f1d1d">a<tspan baseline-shift="sub" font-size="9">0</tspan> = sk = f(0)</text>
    </g>

    <!-- Share points -->
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <g>
        <line x1="220" y1="350" x2="220" y2="207" stroke="#94a3b8" stroke-width="1.7" stroke-dasharray="5 6"/>
        <circle cx="220" cy="207" r="8.5" fill="#0f766e" stroke="#ffffff" stroke-width="3"/>
        <text x="184" y="190" font-size="14" font-weight="700" fill="#0f766e">share 1</text>
        <text x="174" y="407" font-size="14" font-weight="700" fill="#0f766e">participant 1</text>
      </g>

      <g>
        <line x1="360" y1="350" x2="360" y2="189" stroke="#94a3b8" stroke-width="1.7" stroke-dasharray="5 6"/>
        <circle cx="360" cy="189" r="8.5" fill="#0f766e" stroke="#ffffff" stroke-width="3"/>
        <text x="324" y="171" font-size="14" font-weight="700" fill="#0f766e">share 2</text>
        <text x="314" y="407" font-size="14" font-weight="700" fill="#0f766e">participant 2</text>
      </g>

      <g>
        <line x1="500" y1="350" x2="500" y2="220" stroke="#94a3b8" stroke-width="1.7" stroke-dasharray="5 6"/>
        <circle cx="500" cy="220" r="8.5" fill="#0f766e" stroke="#ffffff" stroke-width="3"/>
        <text x="464" y="203" font-size="14" font-weight="700" fill="#0f766e">share 3</text>
        <text x="454" y="407" font-size="14" font-weight="700" fill="#0f766e">participant 3</text>
      </g>
    </g>

    <!-- Formula label -->
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="408" y="68" width="276" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="438" y="96" font-size="17" font-weight="700" fill="#1d4ed8">degree t polynomial</text>
      <text x="438" y="120" font-size="15" fill="#1e3a8a">f(x) = a<tspan baseline-shift="sub" font-size="11">0</tspan> + a<tspan baseline-shift="sub" font-size="11">1</tspan>x + ... + a<tspan baseline-shift="sub" font-size="11">t</tspan>x<tspan baseline-shift="super" font-size="11">t</tspan></text>
    </g>
  </g>
</svg>
