<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DKG group polynomial from participant polynomials</title>
  <desc id="desc">Three participant polynomials combine into one group polynomial. The y-intercept of the group polynomial is the final group secret.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243447"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="600" fill="#f8fafc"/>

  <g transform="translate(96 70)">
    <rect x="0" y="0" width="768" height="440" rx="8" fill="#ffffff" stroke="#d8e0ea" filter="url(#soft-shadow)"/>

    <!-- Plot grid -->
    <g stroke="#e7edf5" stroke-width="1">
      <path d="M 80 52 V 380"/>
      <path d="M 220 52 V 380"/>
      <path d="M 360 52 V 380"/>
      <path d="M 500 52 V 380"/>
      <path d="M 640 52 V 380"/>
      <path d="M 72 320 H 700"/>
      <path d="M 72 250 H 700"/>
      <path d="M 72 180 H 700"/>
      <path d="M 72 110 H 700"/>
    </g>

    <!-- Axes -->
    <g stroke="#243447" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
      <path d="M 80 350 H 704"/>
      <path d="M 80 350 V 54"/>
    </g>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#3f4e60">
      <text x="708" y="357" font-size="17">x</text>
      <text x="68" y="46" font-size="17">y</text>
      <text x="209" y="378" font-size="15">x<tspan baseline-shift="sub" font-size="11">1</tspan></text>
      <text x="349" y="378" font-size="15">x<tspan baseline-shift="sub" font-size="11">2</tspan></text>
      <text x="489" y="378" font-size="15">x<tspan baseline-shift="sub" font-size="11">3</tspan></text>
    </g>

    <!-- Source participant polynomials from dkg-f-1/2/3, shown as muted components. -->
    <g fill="none" stroke-linecap="round" stroke-width="3.2" opacity="0.55">
      <path d="M 80 260 C 165 224, 230 204, 290 195 C 372 183, 438 198, 500 220 C 574 246, 626 272, 684 284"
            stroke="#2563eb" stroke-dasharray="9 8"/>
      <path d="M 80 286 C 130 250, 176 224, 220 220 C 270 216, 314 222, 360 230 C 416 240, 468 248, 500 244 C 570 235, 626 195, 684 156"
            stroke="#0f766e" stroke-dasharray="9 8"/>
      <path d="M 80 228 C 128 188, 176 168, 220 168 C 270 168, 314 182, 360 200 C 416 222, 468 282, 500 298 C 572 334, 628 296, 684 236"
            stroke="#f97316" stroke-dasharray="9 8"/>
    </g>

    <!-- Combined polynomial. Values are rescaled upward for visual clarity. -->
    <path d="M 80 172 C 125 118, 170 94, 220 92 C 275 90, 315 96, 360 104 C 410 115, 455 138, 500 151 C 565 168, 625 140, 684 92"
          fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>

    <!-- Group secret at y-intercept -->
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <line x1="80" y1="172" x2="80" y2="350" stroke="#7c3aed" stroke-width="2.2" stroke-dasharray="6 6"/>
      <circle cx="80" cy="172" r="9" fill="#7c3aed" stroke="#ffffff" stroke-width="3"/>
      <path d="M 90 176 C 118 172, 134 178, 166 190" stroke="#7c3aed" stroke-width="2" fill="none"/>
      <rect x="166" y="160" width="196" height="66" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
      <text x="184" y="184" font-size="15" font-weight="800" fill="#5b21b6">group secret</text>
      <text x="184" y="206" font-size="14" fill="#4c1d95">F(0) = sk<tspan baseline-shift="sub" font-size="10">1</tspan> + sk<tspan baseline-shift="sub" font-size="10">2</tspan> + sk<tspan baseline-shift="sub" font-size="10">3</tspan></text>
    </g>

    <!-- Final share points on F(x) -->
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <g>
        <line x1="220" y1="350" x2="220" y2="92" stroke="#94a3b8" stroke-width="1.7" stroke-dasharray="5 6"/>
        <circle cx="220" cy="92" r="8.5" fill="#7c3aed" stroke="#ffffff" stroke-width="3"/>
        <text x="238" y="76" font-size="14" font-weight="800" fill="#5b21b6">F(x<tspan baseline-shift="sub" font-size="10">1</tspan>)</text>
        <text x="174" y="407" font-size="14" font-weight="700" fill="#0f766e">participant 1</text>
      </g>

      <g>
        <line x1="360" y1="350" x2="360" y2="104" stroke="#94a3b8" stroke-width="1.7" stroke-dasharray="5 6"/>
        <circle cx="360" cy="104" r="8.5" fill="#7c3aed" stroke="#ffffff" stroke-width="3"/>
        <text x="376" y="86" font-size="14" font-weight="800" fill="#5b21b6">F(x<tspan baseline-shift="sub" font-size="10">2</tspan>)</text>
        <text x="314" y="407" font-size="14" font-weight="700" fill="#0f766e">participant 2</text>
      </g>

      <g>
        <line x1="500" y1="350" x2="500" y2="151" stroke="#94a3b8" stroke-width="1.7" stroke-dasharray="5 6"/>
        <circle cx="500" cy="151" r="8.5" fill="#7c3aed" stroke="#ffffff" stroke-width="3"/>
        <text x="520" y="144" font-size="14" font-weight="800" fill="#5b21b6">F(x<tspan baseline-shift="sub" font-size="10">3</tspan>)</text>
        <text x="454" y="407" font-size="14" font-weight="700" fill="#0f766e">participant 3</text>
      </g>
    </g>

    <!-- Formula label -->
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="390" y="226" width="296" height="112" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
      <text x="410" y="254" font-size="17" font-weight="800" fill="#5b21b6">group polynomial</text>
      <text x="410" y="285" font-size="16" font-weight="700" fill="#4c1d95">F(x) = f<tspan baseline-shift="sub" font-size="12">1</tspan>(x) + f<tspan baseline-shift="sub" font-size="12">2</tspan>(x) + f<tspan baseline-shift="sub" font-size="12">3</tspan>(x)</text>
      <text x="410" y="314" font-size="14" fill="#5b21b6">Final shares are points on F(x).</text>
    </g>

    <!-- Legend -->
    <g transform="translate(84 252)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">
      <rect x="0" y="0" width="194" height="88" rx="8" fill="#ffffff" fill-opacity="0.94" stroke="#d8e0ea"/>
      <line x1="16" y1="22" x2="52" y2="22" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 7" opacity="0.65"/>
      <text x="62" y="27" fill="#1d4ed8">f<tspan baseline-shift="sub" font-size="10">1</tspan>(x)</text>
      <line x1="16" y1="44" x2="52" y2="44" stroke="#0f766e" stroke-width="3" stroke-dasharray="8 7" opacity="0.65"/>
      <text x="62" y="49" fill="#0f766e">f<tspan baseline-shift="sub" font-size="10">2</tspan>(x)</text>
      <line x1="16" y1="66" x2="52" y2="66" stroke="#f97316" stroke-width="3" stroke-dasharray="8 7" opacity="0.65"/>
      <text x="62" y="71" fill="#c2410c">f<tspan baseline-shift="sub" font-size="10">3</tspan>(x)</text>
      <line x1="116" y1="44" x2="154" y2="44" stroke="#7c3aed" stroke-width="5"/>
      <text x="160" y="49" fill="#5b21b6">F(x)</text>
    </g>
  </g>
</svg>
