<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Round 2 DKG share exchange and verification</title>
  <desc id="desc">Participants send receiver-specific shares and verify each received share against the sender's coefficient commitments before accepting it.</desc>

  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="#f8fafc"/>

  <g transform="translate(72 58)">
    <rect x="0" y="0" width="816" height="484" rx="8" fill="#ffffff" stroke="#d8e0ea" filter="url(#soft-shadow)"/>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <text x="40" y="48" font-size="24" font-weight="800" fill="#243447">Round 2: receiver-specific shares</text>
      <text x="40" y="76" font-size="15" fill="#536274">Sender i evaluates f<tspan baseline-shift="sub" font-size="11">i</tspan>(x) at receiver j's id and sends s<tspan baseline-shift="sub" font-size="11">ij</tspan>.</text>
    </g>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <g transform="translate(74 122)">
        <circle cx="56" cy="52" r="38" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
        <text x="56" y="62" text-anchor="middle" font-size="26" font-weight="800" fill="#1d4ed8">P1</text>
        <text x="56" y="108" text-anchor="middle" font-size="15" font-weight="800" fill="#1e3a8a">f<tspan baseline-shift="sub" font-size="11">1</tspan>(x)</text>
      </g>

      <g transform="translate(352 122)">
        <circle cx="56" cy="52" r="38" fill="#ccfbf1" stroke="#0f766e" stroke-width="3"/>
        <text x="56" y="62" text-anchor="middle" font-size="26" font-weight="800" fill="#0f766e">P2</text>
        <text x="56" y="108" text-anchor="middle" font-size="15" font-weight="800" fill="#064e3b">f<tspan baseline-shift="sub" font-size="11">2</tspan>(x)</text>
      </g>

      <g transform="translate(630 122)">
        <circle cx="56" cy="52" r="38" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
        <text x="56" y="62" text-anchor="middle" font-size="26" font-weight="800" fill="#c2410c">P3</text>
        <text x="56" y="108" text-anchor="middle" font-size="15" font-weight="800" fill="#9a3412">f<tspan baseline-shift="sub" font-size="11">3</tspan>(x)</text>
      </g>
    </g>

    <g fill="none" stroke-linecap="round" stroke-width="3.2">
      <path d="M 170 164 C 270 88, 546 88, 646 164" stroke="#2563eb" opacity="0.65" marker-end="url(#arrow-blue)"/>
      <path d="M 168 198 C 234 238, 300 238, 366 198" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
      <path d="M 448 164 C 514 112, 580 112, 646 164" stroke="#0f766e" marker-end="url(#arrow-green)"/>
      <path d="M 646 198 C 580 238, 514 238, 448 198" stroke="#f97316" marker-end="url(#arrow-orange)"/>
      <path d="M 366 198 C 300 270, 234 270, 168 198" stroke="#0f766e" opacity="0.85" marker-end="url(#arrow-green)"/>
      <path d="M 648 212 C 520 318, 296 318, 168 212" stroke="#f97316" opacity="0.65" marker-end="url(#arrow-orange)"/>
    </g>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800">
      <text x="383" y="104" fill="#1d4ed8">s<tspan baseline-shift="sub" font-size="9">13</tspan></text>
      <text x="258" y="235" fill="#1d4ed8">s<tspan baseline-shift="sub" font-size="9">12</tspan></text>
      <text x="532" y="125" fill="#0f766e">s<tspan baseline-shift="sub" font-size="9">23</tspan></text>
      <text x="532" y="235" fill="#c2410c">s<tspan baseline-shift="sub" font-size="9">32</tspan></text>
      <text x="258" y="284" fill="#0f766e">s<tspan baseline-shift="sub" font-size="9">21</tspan></text>
      <text x="412" y="304" fill="#c2410c">s<tspan baseline-shift="sub" font-size="9">31</tspan></text>
    </g>

    <g transform="translate(158 324)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="0" width="500" height="70" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
      <circle cx="42" cy="35" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
      <path d="M 31 35 L 39 43 L 53 27" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="30" font-size="16" font-weight="800" fill="#14532d">accept only verified shares</text>
      <text x="76" y="53" font-size="13" fill="#166534">Each receiver checks the sender's share against that sender's commitment vector.</text>
    </g>

    <g transform="translate(202 418)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="0" width="412" height="42" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
      <text x="22" y="27" font-size="16" font-weight="700" fill="#4c1d95">
        s<tspan baseline-shift="sub" font-size="11">ij</tspan> &#183; G ?= &#931; C<tspan baseline-shift="sub" font-size="11">i,k</tspan> x<tspan baseline-shift="sub" font-size="11">j</tspan><tspan baseline-shift="super" font-size="11">k</tspan>
      </text>
      <text x="292" y="27" font-size="13" fill="#6d28d9">(Feldman check)</text>
    </g>
  </g>
</svg>
