<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Each DKG participant creates a local secret polynomial</title>
  <desc id="desc">Three participants independently create local secret polynomials. There is no original private key before the valid contributions are aggregated.</desc>

  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="#f8fafc"/>

  <g transform="translate(72 58)">
    <rect x="0" y="0" width="816" height="484" rx="8" fill="#ffffff" stroke="#d8e0ea" filter="url(#soft-shadow)"/>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <text x="40" y="48" font-size="24" font-weight="800" fill="#243447">Independent secret contributions</text>
      <text x="40" y="76" font-size="15" fill="#536274">No original private key exists before the valid local secrets are aggregated.</text>
    </g>

    <g transform="translate(54 116)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="0" width="194" height="214" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
      <circle cx="97" cy="48" r="31" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
      <text x="97" y="56" text-anchor="middle" font-size="23" font-weight="800" fill="#1d4ed8">P1</text>

      <g transform="translate(34 94)">
        <path d="M 0 76 H 128" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M 12 82 V 8" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M 12 54 C 38 40, 64 32, 86 30 C 105 29, 118 36, 128 42" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
        <circle cx="12" cy="54" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
        <circle cx="72" cy="31" r="5.5" fill="#0f766e" stroke="#ffffff" stroke-width="2"/>
      </g>

      <text x="97" y="188" text-anchor="middle" font-size="16" font-weight="800" fill="#1e3a8a">f<tspan baseline-shift="sub" font-size="11">1</tspan>(x)</text>
      <text x="97" y="207" text-anchor="middle" font-size="13" fill="#1e40af">sk<tspan baseline-shift="sub" font-size="9">1</tspan> = f<tspan baseline-shift="sub" font-size="9">1</tspan>(0)</text>
    </g>

    <g transform="translate(311 116)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="0" width="194" height="214" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
      <circle cx="97" cy="48" r="31" fill="#ccfbf1" stroke="#0f766e" stroke-width="3"/>
      <text x="97" y="56" text-anchor="middle" font-size="23" font-weight="800" fill="#0f766e">P2</text>

      <g transform="translate(34 94)">
        <path d="M 0 76 H 128" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M 12 82 V 8" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M 12 60 C 38 40, 63 31, 84 38 C 105 45, 116 37, 128 22" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round"/>
        <circle cx="12" cy="60" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
        <circle cx="72" cy="36" r="5.5" fill="#2563eb" stroke="#ffffff" stroke-width="2"/>
      </g>

      <text x="97" y="188" text-anchor="middle" font-size="16" font-weight="800" fill="#064e3b">f<tspan baseline-shift="sub" font-size="11">2</tspan>(x)</text>
      <text x="97" y="207" text-anchor="middle" font-size="13" fill="#065f46">sk<tspan baseline-shift="sub" font-size="9">2</tspan> = f<tspan baseline-shift="sub" font-size="9">2</tspan>(0)</text>
    </g>

    <g transform="translate(568 116)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="0" width="194" height="214" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
      <circle cx="97" cy="48" r="31" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
      <text x="97" y="56" text-anchor="middle" font-size="23" font-weight="800" fill="#c2410c">P3</text>

      <g transform="translate(34 94)">
        <path d="M 0 76 H 128" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M 12 82 V 8" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M 12 44 C 37 20, 64 18, 86 36 C 106 52, 118 45, 128 28" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
        <circle cx="12" cy="44" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
        <circle cx="72" cy="26" r="5.5" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
      </g>

      <text x="97" y="188" text-anchor="middle" font-size="16" font-weight="800" fill="#9a3412">f<tspan baseline-shift="sub" font-size="11">3</tspan>(x)</text>
      <text x="97" y="207" text-anchor="middle" font-size="13" fill="#c2410c">sk<tspan baseline-shift="sub" font-size="9">3</tspan> = f<tspan baseline-shift="sub" font-size="9">3</tspan>(0)</text>
    </g>

    <g fill="none" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="7 7">
      <path d="M 151 332 C 176 358, 212 376, 264 392" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
      <path d="M 408 332 V 388" stroke="#0f766e" marker-end="url(#arrow-green)"/>
      <path d="M 665 332 C 640 358, 604 376, 552 392" stroke="#f97316" marker-end="url(#arrow-orange)"/>
    </g>

    <g transform="translate(248 382)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="0" width="320" height="72" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
      <text x="22" y="28" font-size="15" font-weight="800" fill="#5b21b6">later, after aggregation</text>
      <text x="22" y="53" font-size="17" font-weight="700" fill="#4c1d95">F(0) = sk<tspan baseline-shift="sub" font-size="12">1</tspan> + sk<tspan baseline-shift="sub" font-size="12">2</tspan> + sk<tspan baseline-shift="sub" font-size="12">3</tspan></text>
    </g>

    <g transform="translate(602 384)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="#ffffff" stroke="#d8e0ea"/>
      <text x="18" y="28" font-size="14" font-weight="800" fill="#243447">current state</text>
      <text x="18" y="51" font-size="13" fill="#536274">local secrets only</text>
    </g>
  </g>
</svg>
